<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Jennys cafe | CAST LIST</title>
  <meta name="description" content="Jennys cafeの在籍キャスト一覧ページです。写真提供のある在籍キャストを掲載しています。" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <section class="hero">
      <p class="brand">Jennys cafe</p>
      <p class="eyebrow">CAST LIST</p>

      <h1>在籍キャスト</h1>

      <p class="lead">
        写真提供のある在籍キャストを掲載しています。<br>
        最新の出勤状況については、店舗LINEまたはお電話にてご確認ください。
      </p>
    </section>

    <section class="cast-section">
      <p class="section-title">CAST</p>

      <div class="cast-list">
        <article class="cast-card">
          <div class="photo">
            <img src="../assets/CAST/yuki.jpg" alt="ゆき">
          </div>
          <div class="cast-info">
            <h2>ゆき</h2>
            <p class="cast-catch">大人美人</p>
          </div>
        </article>

        <article class="cast-card">
          <div class="photo">
            <img src="../assets/CAST/nayu.jpg" alt="なゆ">
          </div>
          <div class="cast-info">
            <h2>なゆ</h2>
            <p class="cast-catch">かわいい</p>
          </div>
        </article>

        <article class="cast-card">
          <div class="photo">
            <img src="../assets/CAST/hinano.jpg" alt="ひなの">
          </div>
          <div class="cast-info">
            <h2>ひなの</h2>
            <p class="cast-catch">&nbsp;</p>
          </div>
        </article>

      </div>

      <p class="note">
        ※掲載内容は変更となる場合がございます。最新の在籍・出勤状況は店舗LINEまたはスタッフまでご確認ください。
      </p>
    </section>

    <footer>
      © Jennys cafe
    </footer>
  </main>
</body>

</html>
